name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ----------------------------------------------------------------
  #  Lint
  # ----------------------------------------------------------------
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --features testutils -- -D warnings

  # ----------------------------------------------------------------
  #  Test
  # ----------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --features testutils

  # ----------------------------------------------------------------
  #  Build WASM
  # ----------------------------------------------------------------
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build release WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli

      - name: Optimize WASM
        run: |
          soroban contract optimize \
            --wasm target/wasm32-unknown-unknown/release/time_lock_vault.wasm \
            --wasm-out target/time_lock_vault.optimized.wasm

      - name: Check WASM size
        env:
          MAX_WASM_BYTES: 65536
        run: |
          echo "=== Raw WASM ==="
          ls -lh target/wasm32-unknown-unknown/release/time_lock_vault.wasm
          echo "=== Optimized WASM ==="
          ls -lh target/time_lock_vault.optimized.wasm
          ACTUAL=$(wc -c < target/time_lock_vault.optimized.wasm)
          echo "Optimized WASM size: ${ACTUAL} bytes (limit: ${MAX_WASM_BYTES})"
          if [ "$ACTUAL" -gt "$MAX_WASM_BYTES" ]; then
            echo "ERROR: WASM too large: ${ACTUAL} bytes exceeds limit of ${MAX_WASM_BYTES} bytes"
            exit 1
          fi

      - name: Upload optimized WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: time-lock-vault-wasm
          path: target/time_lock_vault.optimized.wasm
          retention-days: 30
